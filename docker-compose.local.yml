services:
  postgres:
    image: postgres:16-alpine
    container_name: rentline-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rentline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - rentline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentline"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  rentline_pgdata:
